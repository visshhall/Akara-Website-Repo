<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Archive - Atelier Ākāra</title>
    <link rel="stylesheet" href="../auth-styles.css">
    <style>
        .products-container { min-height: 100vh; padding: 2rem; padding-top: 100px; }
        .products-content { max-width: 1400px; margin: 0 auto; }
        .products-header { text-align: center; margin-bottom: 3rem; }
        .nav-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(0, 43, 43, 0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .nav-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: var(--font-secondary); font-size: 1.2rem; letter-spacing: 2px; color: var(--archival-cream); }
        .nav-links { display: flex; gap: 2rem; }
        .nav-link { color: var(--archival-cream); text-decoration: none; font-size: 0.9rem; opacity: 0.8; transition: opacity 0.3s; }
        .nav-link:hover { opacity: 1; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .product-card { padding: 2rem; }
        .product-name { font-size: 1.3rem; color: var(--archival-cream); margin-bottom: 0.5rem; }
        .product-price { font-size: 1.1rem; color: var(--archival-cream); opacity: 0.8; margin: 0.5rem 0; }
        .add-product-btn { position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px; border-radius: 50%; background: var(--archival-cream); color: var(--studio-teal); border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 248, 231, 0.3); transition: transform 0.3s; }
        .add-product-btn:hover { transform: scale(1.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <div class="nav-logo">STUDIO CONTROL</div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="orders.html" class="nav-link">Orders</a>
                <a href="users.html" class="nav-link">Users</a>
                <a href="#" class="nav-link" id="logoutBtn">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="products-container">
        <div class="products-content">
            <div class="products-header">
                <h1 style="font-family: var(--font-secondary); font-size: 2.5rem; color: var(--archival-cream);">PRODUCT_ARCHIVE</h1>
                <p style="color: var(--archival-cream); opacity: 0.7;">Inventory Management</p>
            </div>
            <div class="product-grid" id="productsGrid">Loading...</div>
        </div>
    </div>

    <button class="add-product-btn" id="addProductBtn">+</button>

    <div class="modal" id="productModal">
        <div class="modal-content glass-panel" style="padding: 2.5rem;">
            <h2 style="color: var(--archival-cream); margin-bottom: 2rem;">Add New Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" name="name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-input" required>
                        <option value="Planter">Planter</option>
                        <option value="Vase">Vase</option>
                        <option value="Lighting">Lighting</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Retail Price (₹) *</label>
                        <input type="number" name="price" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Trade Price (₹)</label>
                        <input type="number" name="trade_price" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-input" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary">Add Product</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabaseConfig, ADMIN_UUID } from '../config.js';
        import { requireAuth, requireVerification, requireAdmin, sanitizeInput, initializeFormSecurity } from '../utils/security.js';

        const supabase = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
        await requireAuth(supabase);
        await requireVerification(supabase);
        await requireAdmin(supabase, ADMIN_UUID);

        loadProducts();

        async function loadProducts() {
            const { data: products } = await supabase.from('products').select('*').eq('is_active', true).order('created_at', { ascending: false });
            if (!products || products.length === 0) {
                document.getElementById('productsGrid').innerHTML = '<p style="text-align: center; opacity: 0.6;">No products yet. Click + to add.</p>';
                return;
            }
            document.getElementById('productsGrid').innerHTML = products.map(p => `
                <div class="product-card glass-panel">
                    <div class="product-name">${p.name}</div>
                    <div style="font-size: 0.85rem; opacity: 0.6; text-transform: uppercase;">${p.category}</div>
                    <div class="product-price">Retail: ₹${p.price}</div>
                    ${p.trade_price ? `<div style="font-size: 0.9rem; opacity: 0.7;">Trade: ₹${p.trade_price}</div>` : ''}
                    <div style="margin-top: 1rem; opacity: 0.8; font-size: 0.9rem;">${p.description || ''}</div>
                </div>
            `).join('');
        }

        document.getElementById('addProductBtn').addEventListener('click', () => {
            document.getElementById('productModal').classList.add('active');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('productModal').classList.remove('active');
        });

        const form = document.getElementById('productForm');
        initializeFormSecurity(form);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = {
                name: sanitizeInput(formData.get('name')),
                category: formData.get('category'),
                price: parseFloat(formData.get('price')),
                trade_price: formData.get('trade_price') ? parseFloat(formData.get('trade_price')) : null,
                description: sanitizeInput(formData.get('description'))
            };

            if (!data.name || data.price <= 0) {
                alert('Name and price are required');
                return;
            }

            const { error } = await supabase.from('products').insert(data);
            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            form.reset();
            document.getElementById('productModal').classList.remove('active');
            loadProducts();
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '../auth/login.html';
        });
    </script>
</body>
</html>
