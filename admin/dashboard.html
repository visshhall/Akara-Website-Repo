<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Control - Atelier Ākāra</title>
    <link rel="stylesheet" href="../auth-styles.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            padding: 2rem;
            padding-top: 100px;
        }
        
        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .dashboard-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 43, 43, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-family: var(--font-secondary);
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--archival-cream);
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-link {
            color: var(--archival-cream);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .nav-link:hover {
            opacity: 1;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            padding: 2rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: 300;
            color: var(--archival-cream);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--archival-cream);
            opacity: 0.6;
        }
        
        .section-card {
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--archival-cream);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .data-table {
            width: 100%;
            margin-top: 1.5rem;
        }
        
        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .data-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--archival-cream);
            opacity: 0.7;
        }
        
        .data-table td {
            color: var(--archival-cream);
            opacity: 0.9;
        }
        
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--archival-cream);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-small:hover {
            background: rgba(255, 248, 231, 0.1);
            border-color: var(--archival-cream);
        }
        
        .activity-item {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-text {
            color: var(--archival-cream);
            opacity: 0.9;
        }
        
        .activity-time {
            font-size: 0.85rem;
            color: var(--archival-cream);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <div class="nav-logo">STUDIO CONTROL</div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="orders.html" class="nav-link">Orders</a>
                <a href="users.html" class="nav-link">Users</a>
                <a href="#" class="nav-link" id="logoutBtn">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1 style="font-family: var(--font-secondary); font-size: 2.5rem; color: var(--archival-cream); margin-bottom: 0.5rem;">
                    STUDIO_OVERVIEW
                </h1>
                <p style="color: var(--archival-cream); opacity: 0.7;">
                    Real-time Analytics & Control
                </p>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card glass-panel">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">Total Members</div>
                </div>
                
                <div class="stat-card glass-panel">
                    <div class="stat-value" id="totalProducts">0</div>
                    <div class="stat-label">Active Products</div>
                </div>
                
                <div class="stat-card glass-panel">
                    <div class="stat-value" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                
                <div class="stat-card glass-panel">
                    <div class="stat-value" id="totalRevenue">₹0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="section-card glass-panel">
                <h2 class="section-title">Recent Orders</h2>
                <div id="recentOrdersContainer">
                    <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                        Loading orders...
                    </div>
                </div>
            </div>

            <!-- Product Analytics -->
            <div class="section-card glass-panel">
                <h2 class="section-title">Product View Analytics</h2>
                <div id="productAnalyticsContainer">
                    <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                        Loading analytics...
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="section-card glass-panel">
                <h2 class="section-title">Recent Member Activity</h2>
                <div id="activityContainer">
                    <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                        Loading activity...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabaseConfig, ADMIN_UUID } from '../config.js';
        import { requireAuth, requireVerification, requireAdmin } from '../utils/security.js';

        const supabase = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

        // Check authentication and admin access
        await requireAuth(supabase);
        await requireVerification(supabase);
        await requireAdmin(supabase, ADMIN_UUID);

        // Load all dashboard data
        loadDashboardData();

        async function loadDashboardData() {
            try {
                // Load stats
                await Promise.all([
                    loadStats(),
                    loadRecentOrders(),
                    loadProductAnalytics(),
                    loadRecentActivity()
                ]);
            } catch (err) {
                console.error('Dashboard error:', err);
            }
        }

        async function loadStats() {
            try {
                // Total users
                const { count: userCount } = await supabase
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('totalUsers').textContent = userCount || 0;

                // Total products
                const { count: productCount } = await supabase
                    .from('products')
                    .select('*', { count: 'exact', head: true })
                    .eq('is_active', true);
                
                document.getElementById('totalProducts').textContent = productCount || 0;

                // Total orders
                const { count: orderCount } = await supabase
                    .from('orders')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('totalOrders').textContent = orderCount || 0;

                // Total revenue
                const { data: orders } = await supabase
                    .from('orders')
                    .select('total')
                    .eq('payment_status', 'paid');
                
                const revenue = orders ? orders.reduce((sum, order) => sum + parseFloat(order.total), 0) : 0;
                document.getElementById('totalRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');

            } catch (err) {
                console.error('Stats error:', err);
            }
        }

        async function loadRecentOrders() {
            try {
                const { data: orders, error } = await supabase
                    .from('orders')
                    .select(`
                        *,
                        profiles (first_name, last_name, member_id)
                    `)
                    .order('created_at', { ascending: false })
                    .limit(5);
                
                if (error) throw error;

                if (!orders || orders.length === 0) {
                    document.getElementById('recentOrdersContainer').innerHTML = `
                        <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                            No orders yet
                        </div>
                    `;
                    return;
                }

                const html = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Order #</th>
                                <th>Member</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                                <tr>
                                    <td style="font-family: 'Courier New', monospace;">${order.order_number}</td>
                                    <td>
                                        ${order.profiles ? 
                                            `${order.profiles.first_name} ${order.profiles.last_name}<br>
                                            <span style="opacity: 0.6; font-size: 0.85rem;">${order.profiles.member_id}</span>` 
                                            : 'N/A'}
                                    </td>
                                    <td>₹${order.total}</td>
                                    <td style="text-transform: capitalize;">${order.status}</td>
                                    <td>${new Date(order.created_at).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('recentOrdersContainer').innerHTML = html;

            } catch (err) {
                console.error('Recent orders error:', err);
            }
        }

        async function loadProductAnalytics() {
            try {
                // Get all products with view counts
                const { data: products } = await supabase
                    .from('products')
                    .select('id, name')
                    .eq('is_active', true);

                if (!products || products.length === 0) {
                    document.getElementById('productAnalyticsContainer').innerHTML = `
                        <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                            No products yet
                        </div>
                    `;
                    return;
                }

                // Get view counts for each product
                const analyticsData = await Promise.all(
                    products.map(async (product) => {
                        const { count } = await supabase
                            .from('product_views')
                            .select('*', { count: 'exact', head: true })
                            .eq('product_id', product.id);
                        
                        return {
                            name: product.name,
                            views: count || 0
                        };
                    })
                );

                // Sort by views
                analyticsData.sort((a, b) => b.views - a.views);

                const html = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Total Views</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${analyticsData.map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.views}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('productAnalyticsContainer').innerHTML = html;

            } catch (err) {
                console.error('Product analytics error:', err);
            }
        }

        async function loadRecentActivity() {
            try {
                // Get recent user signups
                const { data: users } = await supabase
                    .from('profiles')
                    .select('first_name, last_name, member_id, created_at')
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (!users || users.length === 0) {
                    document.getElementById('activityContainer').innerHTML = `
                        <div style="text-align: center; padding: 2rem; opacity: 0.6;">
                            No recent activity
                        </div>
                    `;
                    return;
                }

                const html = users.map(user => `
                    <div class="activity-item">
                        <div class="activity-text">
                            <strong>${user.first_name} ${user.last_name}</strong> joined
                            <span style="opacity: 0.6;">(${user.member_id})</span>
                        </div>
                        <div class="activity-time">
                            ${getTimeAgo(user.created_at)}
                        </div>
                    </div>
                `).join('');

                document.getElementById('activityContainer').innerHTML = html;

            } catch (err) {
                console.error('Activity error:', err);
            }
        }

        function getTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 30) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '../auth/login.html';
        });
    </script>
</body>
</html>
