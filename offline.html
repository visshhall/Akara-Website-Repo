<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — Atelier Ākāra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#002b2b;--cream:#fff8e7;--gold:#c9a96e;--gold-light:#e2c99a;
      --text-main:#fff8e7;--text-muted:rgba(255,248,231,0.55);--border:rgba(201,169,110,0.25);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Josefin Sans',sans-serif;
      background:var(--teal);color:var(--text-main);
      min-height:100vh;display:flex;flex-direction:column;
      overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}

    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 5%,rgba(0,95,95,0.3) 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 90%,rgba(0,64,64,0.35) 0%,transparent 55%);
      pointer-events:none;z-index:0;
    }
    body::after{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(201,169,110,0.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(201,169,110,0.035) 1px,transparent 1px);
      background-size:60px 60px;pointer-events:none;z-index:0;
    }

    /* Corner accents */
    .corner{position:fixed;width:60px;height:60px;border-color:var(--gold);border-style:solid;opacity:0.2}
    .corner.tl{top:24px;left:24px;border-width:1px 0 0 1px}
    .corner.tr{top:24px;right:24px;border-width:1px 1px 0 0}
    .corner.bl{bottom:24px;left:24px;border-width:0 0 1px 1px}
    .corner.br{bottom:24px;right:24px;border-width:0 1px 1px 0}

    /* Header */
    .site-header{
      position:relative;z-index:10;
      display:flex;align-items:center;justify-content:center;
      padding:1.5rem 2rem;
      border-bottom:1px solid var(--border);
    }
    .brand-logo{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-weight:300;
      letter-spacing:0.32em;text-transform:uppercase;
      color:var(--cream);transition:opacity 0.2s;
    }
    .brand-logo:hover{opacity:0.75}

    /* Main */
    main{
      position:relative;z-index:1;flex:1;
      display:flex;align-items:center;justify-content:center;
      padding:2rem;
    }

    .offline-content{
      text-align:center;max-width:520px;
      animation:fadeUp 0.8s ease both;
    }

    /* Animated signal icon */
    .signal-wrap{
      position:relative;width:80px;height:80px;
      margin:0 auto 2rem;
      display:flex;align-items:center;justify-content:center;
    }
    .signal-ring{
      position:absolute;border-radius:50%;
      border:1px solid rgba(201,169,110,0.25);
      animation:ringPulse 2.5s ease infinite;
    }
    .signal-ring:nth-child(1){width:80px;height:80px;animation-delay:0s}
    .signal-ring:nth-child(2){width:56px;height:56px;animation-delay:0.4s}
    .signal-ring:nth-child(3){width:32px;height:32px;animation-delay:0.8s}
    .signal-dot{
      width:10px;height:10px;border-radius:50%;
      background:rgba(201,169,110,0.4);
      position:relative;z-index:1;
    }
    @keyframes ringPulse{
      0%{opacity:0;transform:scale(0.8)}
      50%{opacity:1}
      100%{opacity:0;transform:scale(1.1)}
    }

    .offline-eyebrow{
      font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;
      color:var(--gold);opacity:0.7;margin-bottom:0.75rem;
    }
    .offline-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2rem,5vw,3.2rem);
      font-weight:300;letter-spacing:0.1em;
      color:var(--cream);margin-bottom:0.75rem;line-height:1.05;
    }
    .offline-divider{
      width:40px;height:1px;background:var(--gold);
      opacity:0.4;margin:0 auto 1.25rem;
    }
    .offline-desc{
      font-size:0.78rem;letter-spacing:0.06em;
      color:var(--text-muted);line-height:1.85;margin-bottom:2.5rem;
    }

    /* Actions */
    .offline-actions{
      display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;
      margin-bottom:2.5rem;
    }
    .btn-retry{
      display:inline-flex;align-items:center;gap:0.5rem;
      padding:0.85rem 2.5rem;
      font-family:'Josefin Sans',sans-serif;
      font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;
      color:var(--teal);background:var(--gold);
      border:1px solid var(--gold);cursor:pointer;transition:all 0.25s;
    }
    .btn-retry:hover{background:transparent;color:var(--gold)}
    .btn-home{
      display:inline-flex;align-items:center;gap:0.5rem;
      padding:0.85rem 2rem;
      font-family:'Josefin Sans',sans-serif;
      font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;
      color:var(--text-muted);border:1px solid var(--border);
      background:none;cursor:pointer;transition:all 0.25s;
    }
    .btn-home:hover{border-color:var(--gold);color:var(--gold)}

    /* Cached pages */
    .cached-section{margin-top:1rem}
    .cached-label{
      font-size:0.58rem;letter-spacing:0.3em;text-transform:uppercase;
      color:var(--text-muted);opacity:0.5;margin-bottom:1rem;
    }
    .cached-links{
      display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;
    }
    .cached-link{
      font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--text-muted);opacity:0.5;transition:color 0.2s,opacity 0.2s;
      display:flex;align-items:center;gap:0.3rem;
    }
    .cached-link:hover{color:var(--gold);opacity:1}

    /* Connection status */
    .status-bar{
      margin-top:2rem;padding-top:1.5rem;
      border-top:1px solid rgba(201,169,110,0.1);
    }
    .status-indicator{
      display:inline-flex;align-items:center;gap:0.5rem;
      font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;
    }
    .status-dot{width:6px;height:6px;border-radius:50%}
    .status-dot.offline{background:var(--error,#e07070);animation:blink 1.5s ease infinite}
    .status-dot.online{background:var(--success,#70c9a0)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .status-text{color:var(--text-muted);opacity:0.55}

    /* Footer */
    .site-footer{
      position:relative;z-index:1;
      text-align:center;padding:1.25rem 2rem;
      border-top:1px solid rgba(201,169,110,0.1);
    }
    .site-footer p{
      font-size:0.58rem;letter-spacing:0.12em;
      color:var(--text-muted);opacity:0.45;
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:480px){
      .corner{display:none}
      .offline-actions{flex-direction:column;align-items:center}
      .btn-retry,.btn-home{width:100%;max-width:280px;justify-content:center}
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <header class="site-header">
    <a href="index.html" class="brand-logo">ATELIER ĀKĀRA</a>
  </header>

  <main>
    <div class="offline-content">

      <div class="signal-wrap">
        <div class="signal-ring"></div>
        <div class="signal-ring"></div>
        <div class="signal-ring"></div>
        <div class="signal-dot"></div>
      </div>

      <p class="offline-eyebrow">No Connection</p>
      <h1 class="offline-title">You're Offline</h1>
      <div class="offline-divider"></div>
      <p class="offline-desc">
        It looks like you've lost your internet connection.<br>
        Some pages you've visited recently may still be available.
      </p>

      <div class="offline-actions">
        <button class="btn-retry" onclick="retryConnection()">
          ↺ Try Again
        </button>
        <a href="index.html" class="btn-home">← Go Home</a>
      </div>

      <div class="cached-section">
        <p class="cached-label">Pages available offline</p>
        <div class="cached-links">
          <a href="index.html"   class="cached-link">→ Home</a>
          <a href="catalog.html" class="cached-link">→ Catalog</a>
          <a href="about.html"   class="cached-link">→ About</a>
          <a href="contact.html" class="cached-link">→ Contact</a>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot offline" id="statusDot"></div>
          <span class="status-text" id="statusText">No internet connection</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Atelier Ākāra &nbsp;|&nbsp; Precision Forge Labs</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function retryConnection() {
      if (navigator.onLine) {
        window.location.href = 'index.html';
      } else {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.style.animation = 'none';
        setTimeout(() => { dot.style.animation = ''; }, 100);
        text.textContent = 'Still offline — check your connection';
        setTimeout(() => { text.textContent = 'No internet connection'; }, 3000);
      }
    }

    // Auto-redirect when connection is restored
    window.addEventListener('online', () => {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.classList.remove('offline');
      dot.classList.add('online');
      dot.style.animation = 'none';
      text.textContent = 'Connection restored — redirecting…';
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    });

    window.addEventListener('offline', () => {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.classList.remove('online');
      dot.classList.add('offline');
      text.textContent = 'No internet connection';
    });
  </script>

</body>
</html>
