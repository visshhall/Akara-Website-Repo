<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Orders — Atelier Ākāra">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <title>My Orders — Atelier Ākāra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --teal:#002b2b;--cream:#fff8e7;--gold:#c9a96e;--gold-light:#e2c99a;
      --text-main:#fff8e7;--text-muted:rgba(255,248,231,0.55);
      --border:rgba(201,169,110,0.25);--border-dim:rgba(201,169,110,0.12);
      --card-bg:rgba(255,248,231,0.03);--input-bg:rgba(255,248,231,0.05);
      --error:#e07070;--success:#70c9a0;--warning:#e2a96e;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Josefin Sans',sans-serif;background:var(--teal);color:var(--text-main);min-height:100vh;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 5%,rgba(0,95,95,0.3) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 90%,rgba(0,64,64,0.35) 0%,transparent 55%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,169,110,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.035) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

    /* Header */
    .site-header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,43,43,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-container{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;padding:0 2rem;height:64px}
    .nav-left,.nav-right{display:flex;align-items:center;gap:2rem;min-width:160px}
    .nav-right{justify-content:flex-end}
    .brand-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:var(--cream);white-space:nowrap}
    .nav-link{font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);transition:color 0.2s}
    .nav-link:hover{color:var(--gold)}
    .menu-toggle{display:none;background:none;border:none;color:var(--text-main);font-size:1.2rem;cursor:pointer}
    .mobile-nav{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(0,43,43,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:1.5rem 2rem;z-index:99;flex-direction:column;gap:1.2rem}
    .mobile-nav.open{display:flex}
    .mobile-nav a{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);padding:0.4rem 0;border-bottom:1px solid rgba(201,169,110,0.1)}
    .mobile-nav a:hover{color:var(--gold)}

    /* Page */
    .orders-page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:84px 2rem 5rem}
    .breadcrumbs{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);padding:1.5rem 0 0}
    .breadcrumbs a{color:var(--gold);opacity:0.7;transition:opacity 0.2s}
    .breadcrumbs a:hover{opacity:1}
    .breadcrumbs span{opacity:0.45;margin:0 0.5rem}

    /* Page header */
    .page-header{padding:2rem 0 1.75rem}
    .page-eyebrow{font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);opacity:0.75;margin-bottom:0.5rem}
    .page-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;letter-spacing:0.1em;color:var(--cream);margin-bottom:0.5rem}
    .page-divider{width:40px;height:1px;background:var(--gold);opacity:0.4;margin-bottom:1.25rem}

    /* Filter tabs */
    .filter-tabs{display:flex;border-bottom:1px solid var(--border-dim);margin-bottom:1.75rem;flex-wrap:wrap}
    .filter-tab{background:none;border:none;border-bottom:2px solid transparent;font-family:'Josefin Sans',sans-serif;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);padding:0.65rem 1.1rem;cursor:pointer;transition:all 0.2s;margin-bottom:-1px}
    .filter-tab:hover{color:var(--gold-light)}
    .filter-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

    /* Order card */
    .order-card{background:var(--card-bg);border:1px solid var(--border);margin-bottom:1.25rem;transition:border-color 0.25s;animation:fadeUp 0.4s ease both}
    .order-card:hover{border-color:rgba(201,169,110,0.4)}
    .order-card-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-dim);flex-wrap:wrap;gap:0.75rem;cursor:pointer}
    .order-card-header:hover .order-number{color:var(--gold)}
    .order-left{display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap}
    .order-number{font-family:'Courier New',monospace;font-size:0.72rem;color:var(--cream);letter-spacing:0.1em;transition:color 0.2s}
    .order-date{font-size:0.62rem;letter-spacing:0.08em;color:var(--text-muted);opacity:0.65}
    .order-right{display:flex;align-items:center;gap:1rem}
    .order-total{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;color:var(--gold)}
    .chevron{font-size:0.8rem;color:var(--text-muted);opacity:0.5;transition:transform 0.3s}
    .order-card.expanded .chevron{transform:rotate(180deg)}

    /* Status badge */
    .status-badge{font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;padding:0.22rem 0.6rem;border:1px solid;display:inline-block}
    .status-pending{color:var(--warning);border-color:rgba(226,169,110,0.4)}
    .status-confirmed{color:var(--gold);border-color:rgba(201,169,110,0.4)}
    .status-shipped{color:var(--gold-light);border-color:rgba(226,201,154,0.4)}
    .status-delivered{color:var(--success);border-color:rgba(112,201,160,0.4)}
    .status-cancelled{color:var(--error);border-color:rgba(224,112,112,0.4)}

    /* Order body (expandable) */
    .order-body{display:none;padding:1.25rem 1.5rem}
    .order-card.expanded .order-body{display:block;animation:fadeUp 0.3s ease both}

    /* Timeline */
    .order-timeline{display:flex;gap:0;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:0.5rem}
    .timeline-step{flex:1;text-align:center;position:relative;min-width:90px}
    .timeline-step:not(:last-child)::after{content:'';position:absolute;top:12px;left:60%;right:-40%;height:2px;background:var(--border-dim)}
    .timeline-step.done::after{background:rgba(201,169,110,0.4)}
    .timeline-dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--border-dim);background:rgba(255,248,231,0.03);display:flex;align-items:center;justify-content:center;margin:0 auto 0.4rem;font-size:0.6rem;color:var(--text-muted);position:relative;z-index:1}
    .timeline-step.done .timeline-dot{border-color:rgba(201,169,110,0.5);background:rgba(201,169,110,0.1);color:var(--gold)}
    .timeline-step.current .timeline-dot{border-color:var(--gold);background:rgba(201,169,110,0.15);color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,0.12)}
    .timeline-label{font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);opacity:0.55}
    .timeline-step.done .timeline-label,.timeline-step.current .timeline-label{color:var(--gold);opacity:0.8}

    /* Items list */
    .order-items{margin-bottom:1.25rem}
    .order-items-label{font-size:0.57rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);opacity:0.65;margin-bottom:0.75rem}
    .order-item{display:flex;align-items:center;gap:1rem;padding:0.65rem 0;border-bottom:1px solid var(--border-dim)}
    .order-item:last-child{border-bottom:none}
    .order-item-img{width:48px;height:48px;background:rgba(0,64,64,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .order-item-img img{width:100%;height:100%;object-fit:cover}
    .order-item-info{flex:1;min-width:0}
    .order-item-name{font-size:0.72rem;letter-spacing:0.07em;color:var(--cream);margin-bottom:0.15rem}
    .order-item-variant{font-size:0.6rem;letter-spacing:0.08em;color:var(--text-muted);opacity:0.6}
    .order-item-price{font-size:0.72rem;color:var(--gold-light);flex-shrink:0}
    .order-item-qty{font-size:0.6rem;color:var(--text-muted);opacity:0.6;flex-shrink:0}

    /* Summary row */
    .order-summary{background:rgba(255,248,231,0.03);border:1px solid var(--border-dim);padding:1rem 1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem}
    .summary-item{}
    .summary-key{font-size:0.54rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);opacity:0.65;margin-bottom:0.25rem}
    .summary-val{font-size:0.72rem;letter-spacing:0.07em;color:var(--cream)}

    /* Actions */
    .order-actions{display:flex;gap:0.6rem;flex-wrap:wrap}
    .btn-order-action{padding:0.52rem 1.1rem;font-family:'Josefin Sans',sans-serif;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;border:1px solid var(--border);color:var(--text-muted);background:none;cursor:pointer;transition:all 0.2s}
    .btn-order-action:hover{border-color:var(--gold);color:var(--gold)}
    .btn-order-action.primary{color:var(--gold);border-color:rgba(201,169,110,0.4)}
    .btn-order-action.danger:hover{border-color:var(--error);color:var(--error)}

    /* Empty state */
    .empty-state{text-align:center;padding:5rem 2rem;animation:fadeUp 0.5s ease both}
    .empty-icon{font-size:2.5rem;opacity:0.15;margin-bottom:1.5rem}
    .empty-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;letter-spacing:0.1em;color:var(--cream);margin-bottom:0.5rem}
    .empty-desc{font-size:0.72rem;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:2rem;line-height:1.8}
    .btn-shop{display:inline-block;padding:0.82rem 2.5rem;font-family:'Josefin Sans',sans-serif;font-size:0.63rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--teal);background:var(--gold);border:1px solid var(--gold);transition:all 0.25s}
    .btn-shop:hover{background:transparent;color:var(--gold)}

    /* Loading */
    .loading-state{text-align:center;padding:4rem;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);opacity:0.5}

    /* Account nav */
    .account-nav{display:flex;gap:0;border:1px solid var(--border-dim);margin-bottom:2rem;flex-wrap:wrap}
    .account-nav-link{flex:1;text-align:center;padding:0.75rem 0.5rem;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);transition:all 0.2s;border-right:1px solid var(--border-dim);min-width:80px}
    .account-nav-link:last-child{border-right:none}
    .account-nav-link:hover{color:var(--gold);background:rgba(201,169,110,0.04)}
    .account-nav-link.active{color:var(--gold);background:rgba(201,169,110,0.07)}

    /* Footer */
    .site-footer{background:rgba(0,20,20,0.6);border-top:1px solid var(--border);padding:2rem;position:relative;z-index:1;text-align:center}
    .site-footer p{font-size:0.62rem;letter-spacing:0.12em;color:var(--text-muted);opacity:0.6}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){.menu-toggle{display:block}.order-summary{grid-template-columns:1fr 1fr}.order-card-header{flex-direction:column;align-items:flex-start}}
    @media(max-width:480px){.account-nav{display:none}.order-summary{grid-template-columns:1fr}}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <nav class="nav-container">
      <div class="nav-left">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <a href="../catalog.html" class="nav-link desktop-only">Catalog</a>
      </div>
      <a href="../index.html" class="brand-logo">ATELIER ĀKĀRA</a>
      <div class="nav-right">
        <a href="cart.html"    class="nav-link">🛒 <span id="cartCount">0</span></a>
        <a href="profile.html" class="nav-link">👤</a>
      </div>
    </nav>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="../catalog.html">Catalog</a>
    <a href="../about.html">About</a>
    <a href="profile.html">My Account</a>
    <a href="cart.html">Cart</a>
  </nav>

  <main class="orders-page">

    <nav class="breadcrumbs">
      <a href="../index.html">Home</a><span>/</span>
      <a href="profile.html">Account</a><span>/</span>
      My Orders
    </nav>

    <div class="page-header">
      <p class="page-eyebrow">Account</p>
      <h1>My Orders</h1>
      <div class="page-divider"></div>
    </div>

    <!-- Account nav -->
    <div class="account-nav">
      <a href="profile.html"  class="account-nav-link">Profile</a>
      <a href="orders.html"   class="account-nav-link active">Orders</a>
      <a href="wishlist.html" class="account-nav-link">Wishlist</a>
      <a href="reward.html"   class="account-nav-link">Rewards</a>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">All Orders</button>
      <button class="filter-tab" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-tab" onclick="setFilter('confirmed',this)">Confirmed</button>
      <button class="filter-tab" onclick="setFilter('shipped',this)">Shipped</button>
      <button class="filter-tab" onclick="setFilter('delivered',this)">Delivered</button>
      <button class="filter-tab" onclick="setFilter('cancelled',this)">Cancelled</button>
    </div>

    <!-- Orders list -->
    <div id="ordersList">
      <div class="loading-state">Loading your orders…</div>
    </div>

  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Atelier Ākāra &nbsp;|&nbsp; Precision Forge Labs &nbsp;|&nbsp; GST: 27GZCPS9353H1ZQ</p>
  </footer>

  <script>
    const SUPABASE_URL      = '';
    const SUPABASE_ANON_KEY = '';

    let supabase    = null;
    let allOrders   = [];
    let activeFilter = 'all';

    document.getElementById('year').textContent = new Date().getFullYear();

    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    document.getElementById('menuToggle').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.toggle('open'));

    // Cart count
    const cart = JSON.parse(localStorage.getItem('akara_cart') || '[]');
    document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+(i.qty||1), 0);

    // Auth check
    async function init() {
      if (!supabase) { allOrders = DEMO_ORDERS; renderOrders(); return; }
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '../auth/login.html'; return; }
      await loadOrders(session.user.id);
    }

    async function loadOrders(userId) {
      try {
        const { data, error } = await supabase
          .from('orders')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false });
        if (error) throw error;
        allOrders = data || [];
      } catch { allOrders = DEMO_ORDERS; }
      renderOrders();
    }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    }

    function renderOrders() {
      const filtered = activeFilter === 'all'
        ? allOrders
        : allOrders.filter(o => o.status === activeFilter);

      const container = document.getElementById('ordersList');

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <h2 class="empty-title">${activeFilter === 'all' ? 'No Orders Yet' : `No ${activeFilter} Orders`}</h2>
            <p class="empty-desc">${activeFilter === 'all'
              ? 'Your orders will appear here once you make a purchase.'
              : `You don't have any ${activeFilter} orders.`}</p>
            <a href="../catalog.html" class="btn-shop">Browse Collection</a>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map((order, i) => {
        const items   = order.items || [];
        const steps   = getTimelineSteps(order.status);
        const statusClass = `status-${order.status || 'pending'}`;

        return `
          <div class="order-card" id="order-${order.id}" style="animation-delay:${i*0.06}s">
            <div class="order-card-header" onclick="toggleOrder('${order.id}')">
              <div class="order-left">
                <span class="order-number">${order.order_number || order.id}</span>
                <span class="status-badge ${statusClass}">${(order.status||'pending').replace('_',' ')}</span>
                <span class="order-date">${fmtDate(order.created_at)}</span>
              </div>
              <div class="order-right">
                <span class="order-total">₹${Number(order.total||0).toLocaleString('en-IN')}</span>
                <span class="chevron">▾</span>
              </div>
            </div>
            <div class="order-body">
              <!-- Timeline -->
              <div class="order-timeline">
                ${steps.map(s => `
                  <div class="timeline-step ${s.state}">
                    <div class="timeline-dot">${s.icon}</div>
                    <div class="timeline-label">${s.label}</div>
                  </div>`).join('')}
              </div>

              <!-- Items -->
              <div class="order-items">
                <p class="order-items-label">Items (${items.length})</p>
                ${items.map(item => `
                  <div class="order-item">
                    <div class="order-item-img">
                      ${item.image_url
                        ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy">`
                        : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/></svg>`}
                    </div>
                    <div class="order-item-info">
                      <div class="order-item-name">${item.name}</div>
                      ${item.color || item.size ? `<div class="order-item-variant">${[item.color,item.size].filter(Boolean).join(' · ')}</div>` : ''}
                    </div>
                    <span class="order-item-qty">×${item.qty||1}</span>
                    <span class="order-item-price">₹${Number((item.price||0)*(item.qty||1)).toLocaleString('en-IN')}</span>
                  </div>`).join('')}
              </div>

              <!-- Summary -->
              <div class="order-summary">
                <div class="summary-item">
                  <div class="summary-key">Payment</div>
                  <div class="summary-val">${order.payment_method || 'Razorpay'}</div>
                </div>
                <div class="summary-item">
                  <div class="summary-key">Shipping</div>
                  <div class="summary-val">${order.shipping > 0 ? '₹'+order.shipping : 'Free'}</div>
                </div>
                <div class="summary-item">
                  <div class="summary-key">Grand Total</div>
                  <div class="summary-val">₹${Number(order.total||0).toLocaleString('en-IN')}</div>
                </div>
              </div>

              <!-- Actions -->
              <div class="order-actions">
                ${order.tracking_number
                  ? `<button class="btn-order-action primary" onclick="trackOrder('${order.tracking_number}')">Track Order →</button>`
                  : ''}
                <button class="btn-order-action" onclick="downloadInvoice('${order.id}')">↓ Invoice</button>
                ${order.status === 'pending'
                  ? `<button class="btn-order-action danger" onclick="cancelOrder('${order.id}')">Cancel Order</button>`
                  : ''}
                <a href="../catalog.html" class="btn-order-action" style="display:inline-block;text-align:center;">Reorder</a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleOrder(id) {
      const card = document.getElementById(`order-${id}`);
      card.classList.toggle('expanded');
    }

    function getTimelineSteps(status) {
      const all = [
        { key:'pending',   label:'Ordered',   icon:'📋' },
        { key:'confirmed', label:'Confirmed', icon:'✓'  },
        { key:'shipped',   label:'Shipped',   icon:'🚚'  },
        { key:'delivered', label:'Delivered', icon:'📦'  },
      ];
      const order = ['pending','confirmed','shipped','delivered'];
      const current = order.indexOf(status);
      return all.map((s, i) => ({
        ...s,
        state: i < current ? 'done' : i === current ? 'current' : ''
      }));
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }

    function trackOrder(trackingNum) {
      window.open(`https://www.delhivery.com/track-package/?val=${trackingNum}`, '_blank');
    }

    function downloadInvoice(orderId) {
      // In production: fetch invoice HTML from Supabase storage and trigger download
      alert(`Invoice download for order ${orderId}\n\nWire up to AkaraInvoice.downloadHTML() with the order data.`);
    }

    async function cancelOrder(orderId) {
      if (!confirm('Are you sure you want to cancel this order? This action cannot be undone.')) return;
      if (supabase) {
        const { error } = await supabase
          .from('orders').update({ status: 'cancelled' }).eq('id', orderId);
        if (!error) {
          const o = allOrders.find(x => x.id === orderId);
          if (o) o.status = 'cancelled';
          renderOrders();
        }
      } else {
        const o = allOrders.find(x => x.id === orderId);
