<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Specs - Atelier Ākāra</title>
    <link rel="stylesheet" href="../auth-styles.css">
    <style>
        .profile-container {
            min-height: 100vh;
            padding: 2rem;
            padding-top: 100px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .profile-content {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .profile-card {
            margin-bottom: 2rem;
            padding: 2rem;
        }
        
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        
        .spec-item {
            text-align: center;
        }
        
        .spec-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--archival-cream);
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }
        
        .spec-value {
            font-size: 1.2rem;
            color: var(--archival-cream);
            font-weight: 500;
        }
        
        .history-table {
            width: 100%;
            margin-top: 1.5rem;
        }
        
        .history-table th,
        .history-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .history-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--archival-cream);
            opacity: 0.7;
        }
        
        .history-table td {
            color: var(--archival-cream);
            opacity: 0.9;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 43, 43, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-family: var(--font-secondary);
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--archival-cream);
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-link {
            color: var(--archival-cream);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .nav-link:hover {
            opacity: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <div class="nav-logo">ATELIER ĀKĀRA</div>
            <div class="nav-links">
                <a href="profile.html" class="nav-link">Identity</a>
                <a href="orders.html" class="nav-link">Orders</a>
                <a href="#" class="nav-link" id="logoutBtn">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-content">
            <div class="profile-header">
                <h1 style="font-family: var(--font-secondary); font-size: 2.5rem; color: var(--archival-cream); margin-bottom: 0.5rem;">
                    IDENTITY_SPECS
                </h1>
                <p style="color: var(--archival-cream); opacity: 0.7; font-size: 0.9rem;">
                    Your Personal Archive
                </p>
            </div>

            <!-- Identity Specs -->
            <div class="profile-card glass-panel">
                <h2 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--archival-cream); margin-bottom: 2rem;">
                    Identity Specifications
                </h2>
                
                <div class="spec-grid">
                    <div class="spec-item">
                        <div class="spec-label">Member ID</div>
                        <div class="spec-value member-id" id="memberId">Loading...</div>
                    </div>
                    
                    <div class="spec-item">
                        <div class="spec-label">Member Since</div>
                        <div class="spec-value" id="memberSince">Loading...</div>
                    </div>
                    
                    <div class="spec-item">
                        <div class="spec-label">Identity</div>
                        <div class="spec-value" id="memberName">Loading...</div>
                    </div>
                    
                    <div class="spec-item">
                        <div class="spec-label">Status</div>
                        <div class="spec-value" style="color: #10b981;">Verified</div>
                    </div>
                </div>
            </div>

            <!-- Acquisition History -->
            <div class="profile-card glass-panel">
                <h2 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--archival-cream); margin-bottom: 1.5rem;">
                    ACQUISITION_HISTORY
                </h2>
                
                <div id="historyContainer">
                    <div class="empty-state">
                        <p>No acquisition history yet. Explore the collection to begin your archive.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabaseConfig } from '../config.js';
        import { requireAuth, requireVerification } from '../utils/security.js';

        const supabase = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

        // Check authentication
        await requireAuth(supabase);
        await requireVerification(supabase);

        // Load profile data
        loadProfile();

        async function loadProfile() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                if (error) throw error;
                
                // Display specs
                document.getElementById('memberId').textContent = profile.member_id || 'N/A';
                document.getElementById('memberSince').textContent = new Date(profile.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
                document.getElementById('memberName').textContent = `${profile.first_name} ${profile.last_name}`;
                
                // Load acquisition history
                loadHistory(user.id);
                
            } catch (err) {
                console.error('Profile error:', err);
            }
        }

        async function loadHistory(userId) {
            try {
                const { data: inquiries, error } = await supabase
                    .from('inquiries')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false});
                
                if (error) throw error;
                
                if (!inquiries || inquiries.length === 0) return;
                
                // Build table
                const table = `
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Artifact</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${inquiries.map(inq => `
                                <tr>
                                    <td>${inq.product_name}</td>
                                    <td>${new Date(inq.created_at).toLocaleDateString()}</td>
                                    <td style="text-transform: capitalize;">${inq.status}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                document.getElementById('historyContainer').innerHTML = table;
                
            } catch (err) {
                console.error('History error:', err);
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '../auth/login.html';
        });
    </script>
</body>
</html>
