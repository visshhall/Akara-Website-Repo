<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Atelier Ākāra</title>
    <link rel="stylesheet" href="/auth-styles.css">
</head>
<body>
    <main class="success-page">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <h1>Order Confirmed!</h1>
            <p>Thank you for your purchase.</p>
            
            <div class="order-details">
                <p><strong>Order Number:</strong> <span id="orderNumber"></span></p>
                <p><strong>Total:</strong> <span id="orderTotal"></span></p>
            </div>
            
            <p>You will receive an email confirmation shortly.</p>
            
            <div class="success-actions">
                <a href="/user/orders.html" class="btn-primary">View Orders</a>
                <a href="/catalog.html" class="btn-secondary">Continue Shopping</a>
            </div>
        </div>
    </main>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('orderNumber').textContent = params.get('order') || 'N/A';
        document.getElementById('orderTotal').textContent = params.get('total') || '₹0';
    </script>
</body>
</html>
