<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - Atelier Ākāra</title>
    <link rel="stylesheet" href="../auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box glass-panel">
            <div class="auth-logo">
                <h1>ATELIER ĀKĀRA</h1>
                <p>Update Password</p>
            </div>

            <div id="message-container"></div>

            <form id="updateForm">
                <div class="form-group">
                    <label for="password" class="form-label">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter new password"
                        required
                        autocomplete="new-password"
                    >
                    <div class="password-strength" id="passwordStrength" style="display: none;">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--archival-cream); opacity: 0.6; margin-top: 0.5rem;">
                        Min 8 characters, 1 uppercase, 1 lowercase, 1 number
                    </p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="Confirm new password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn-primary" id="updateBtn">
                    <span id="btnText">Update Password</span>
                    <span id="btnSpinner" class="spinner" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        import { supabaseConfig } from '../config.js';
        import { sanitizeInput, validatePassword, initializeFormSecurity } from '../utils/security.js';

        // Initialize Supabase
        const supabase = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

        // Initialize form security
        const form = document.getElementById('updateForm');
        initializeFormSecurity(form);

        // Password strength indicator
        const passwordInput = document.getElementById('password');
        const strengthContainer = document.getElementById('passwordStrength');
        const strengthBar = document.getElementById('strengthBar');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            if (password.length === 0) {
                strengthContainer.style.display = 'none';
                return;
            }

            strengthContainer.style.display = 'block';
            const { strength } = validatePassword(password);
            strengthBar.className = 'password-strength-bar strength-' + strength;
        });

        // Check if user came from reset email
        checkResetToken();

        async function checkResetToken() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                showMessage('Invalid or expired reset link. Please request a new password reset.', 'error');
                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 3000);
            }
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = sanitizeInput(document.getElementById('password').value);
            const confirmPassword = sanitizeInput(document.getElementById('confirmPassword').value);
            
            // Validate
            const passwordValidation = validatePassword(password);
            if (!passwordValidation.isValid) {
                showMessage('Password must be at least 8 characters with uppercase, lowercase, and number.', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            setLoading(true);
            
            try {
                const { error } = await supabase.auth.updateUser({
                    password: password
                });
                
                if (error) {
                    showMessage(error.message, 'error');
                    setLoading(false);
                    return;
                }
                
                showMessage('Password updated successfully! Redirecting to login...', 'success');
                
                // Sign out and redirect to login
                setTimeout(async () => {
                    await supabase.auth.signOut();
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (err) {
                console.error('Update error:', err);
                showMessage('An unexpected error occurred. Please try again.', 'error');
                setLoading(false);
            }
        });

        function setLoading(loading) {
            const btn = document.getElementById('updateBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnSpinner.style.display = loading ? 'inline-block' : 'none';
        }

        function showMessage(text, type = 'info') {
            const container = document.getElementById('message-container');
            container.innerHTML = `
                <div class="message message-${type}">
                    ${text}
                </div>
            `;
        }
    </script>
</body>
</html>
