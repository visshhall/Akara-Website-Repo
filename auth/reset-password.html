<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Atelier Ākāra</title>
    <link rel="stylesheet" href="../auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box glass-panel">
            <div class="auth-logo">
                <h1>ATELIER ĀKĀRA</h1>
                <p>Reset Password</p>
            </div>

            <div id="message-container"></div>

            <div id="requestForm">
                <p style="color: var(--archival-cream); opacity: 0.9; margin-bottom: 2rem; text-align: center;">
                    Enter your email address and we'll send you a link to reset your password.
                </p>

                <form id="resetForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="your@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <button type="submit" class="btn-primary" id="resetBtn">
                        <span id="btnText">Send Reset Link</span>
                        <span id="btnSpinner" class="spinner" style="display: none;"></span>
                    </button>
                </form>

                <div class="auth-footer">
                    <a href="login.html" class="auth-link">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        import { supabaseConfig } from '../config.js';
        import { sanitizeInput, isValidEmail, initializeFormSecurity } from '../utils/security.js';

        // Initialize Supabase
        const supabase = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

        // Initialize form security
        const form = document.getElementById('resetForm');
        initializeFormSecurity(form);

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = sanitizeInput(document.getElementById('email').value);
            
            // Validate
            if (!isValidEmail(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }
            
            setLoading(true);
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/auth/update-password.html'
                });
                
                if (error) {
                    showMessage(error.message, 'error');
                    setLoading(false);
                    return;
                }
                
                showMessage(
                    'Password reset link sent! Check your email inbox (and spam folder) for the reset link.',
                    'success'
                );
                
                form.reset();
                setLoading(false);
                
            } catch (err) {
                console.error('Reset error:', err);
                showMessage('An unexpected error occurred. Please try again.', 'error');
                setLoading(false);
            }
        });

        function setLoading(loading) {
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnSpinner.style.display = loading ? 'inline-block' : 'none';
        }

        function showMessage(text, type = 'info') {
            const container = document.getElementById('message-container');
            container.innerHTML = `
                <div class="message message-${type}">
                    ${text}
                </div>
            `;
        }
    </script>
</body>
</html>
